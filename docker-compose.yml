services:
  postgres:
    image: postgres:16-alpine
    container_name: usfx_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: usfx_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usfx_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      AI_SERVICE_URL: http://ai_service:8001
      CORS_ORIGINS: ${CORS_ORIGINS}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - audio_uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: usfx_ai_service
    ports:
      - "8001:8001"
    environment:
      MODEL_DIR: /app/data/models
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      USE_GPU: ${USE_GPU:-true}
      BERT_MODEL: ${BERT_MODEL:-dccuchile/bert-base-spanish-wwm-cased}
      BACKEND_URL: http://backend:8000
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      USE_ZERO_SHOT_CLASSIFIER: ${USE_ZERO_SHOT_CLASSIFIER:-false}
    depends_on:
      - redis
    volumes:
      - ./ai_service:/app
      - ai_models:/app/data/models
      - audio_uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: usfx_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ai_models:
  audio_uploads:
